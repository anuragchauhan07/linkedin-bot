<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: sans-serif;
      background: #fff;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #0a66c2;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: none;
      box-sizing: border-box;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #0a66c2;
      color: white;
      font-size: 13px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #444;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>LinkedIn Reply Bot</h2>
  <textarea id="reply" placeholder="Type your reply message..."></textarea>
  <button id="btn">Reply to All Comments</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
